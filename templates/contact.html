{% extends 'base.html' %}
{% load static %}

{% block body %}
  <!-- ✅ SUCCESS MESSAGE (RIGHT PLACE) -->
  <div class="container mt-3">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-success text-center">{{ message }}</div>
      {% endfor %}
    {% endif %}
  </div>

  <style>
    body {
      background-color: #f5f5f5;
    }
    
    .top-photo {
      width: 100%;
      height: 500px;
      object-fit: cover;
    }
    
    .contact-section {
      padding: 60px 0;
    }
    
    .contact-box {
      background-color: black;
      color: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.4);
    }
    
    .contact-box input,
    .contact-box textarea {
      background-color: #111;
      border: 1px solid #444;
      color: white;
      padding: 12px;
    }
    
    .contact-box input::placeholder,
    .contact-box textarea::placeholder {
      color: #aaa;
    }
    
    .contact-box input:focus,
    .contact-box textarea:focus {
      background-color: #111;
      color: white;
      box-shadow: none;
      border-color: #0d6efd;
    }
    
    .send-btn {
      width: 100%;
      padding: 12px;
      border: none;
      background-color: #0d6efd;
      color: white;
      border-radius: 10px;
      font-size: 18px;
      transition: 0.3s;
    }
    
    .send-btn:hover {
      background-color: #084298;
    }
  </style>

  <!-- Top Image -->
  <img src="{% static 'images/contact_us.jpg' %}" class="top-photo" />

  <!-- Contact Form -->
  <div class="container contact-section">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div style="
          background: url{% static 'images/contactus.jpg' %} center/cover no-repeat;
          padding: 50px;
          border-radius: 20px;
          position: relative;
      ">
          <!-- VERY LIGHT OVERLAY -->
          <div style="
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.15);
            border-radius: 20px;
        "></div>

          <!-- SUPER TRANSPARENT FORM -->
          <div style="
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 15px;
            color: #000;
        ">
            <h2 style="text-align:center; color:#ff4d6d; font-weight:bold;">📩 Contact Us</h2>

            <form action="/contact/" method="POST">
              {% csrf_token %}

              <div class="mb-3">
                <label style="font-weight:800;">Full Name</label>
                <input type="text" name="name" class="form-control" required />
              </div>

              <div class="mb-3">
                <label style="font-weight:800;">Email</label>
                <input type="email" name="email" class="form-control" required />
              </div>

              <div class="mb-3">
                <label style="font-weight:800;">Phone</label>
                <input type="text" name="phone" class="form-control" required />
              </div>

              <div class="mb-3">
                <label style="font-weight:800;">Message</label>
                <textarea name="mess" rows="5" class="form-control" required></textarea>
              </div>

              <button type="submit" class="btn btn-danger w-100">Send Message 🍦</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
