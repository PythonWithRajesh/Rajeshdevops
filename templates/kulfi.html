{% extends 'base.html' %}

{% block title %}
  Kulfi
{% endblock %}

{% block body %}
  <style>
    body {
      background: linear-gradient(to right, #fff6e6, #ffe0b3);
    }
    
    .main-title {
      text-align: center;
      margin-top: 30px;
      font-size: 45px;
      font-weight: bold;
      color: #d35400;
    }
    
    .product-container {
      width: 90%;
      margin: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
      margin-bottom: 40px;
    }
    
    .card-box {
      width: 300px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
      transition: 0.4s;
    }
    
    .card-box:hover {
      transform: translateY(-10px);
    }
    
    .card-box img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }
    
    .card-content {
      padding: 20px;
      text-align: center;
    }
    
    .price {
      font-size: 24px;
      color: green;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .buy-btn {
      background: #ff6600;
      color: white;
      padding: 10px 25px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      transition: 0.3s;
    }
    
    .buy-btn:hover {
      background: #cc5200;
    }
  </style>

  <h1 class="main-title">🍨 Delicious Kulfi Collection 🍨</h1>

  <div class="product-container">
    <!-- Kulfi 2 -->
    <div class="card-box">
      <img src="/static/images/kulfi1.jpg" alt="" />
      <div class="card-content">
        <h3>Kesar Kulfi</h3>
        <p class="price">₹90</p>
        <button class="buy-btn">Buy Now</button>
      </div>
    </div>

{% endblock %}
