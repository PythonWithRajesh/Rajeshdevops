{% extends 'base.html' %}

{% block title %}
  Badam Shake
{% endblock %}

{% block body %}
  <style>
    body {
      background: linear-gradient(to right, #fff5e6, #ffe6cc);
    }
    
    .title {
      text-align: center;
      margin-top: 30px;
      font-size: 45px;
      font-weight: bold;
      color: #b35c00;
    }
    
    .container-box {
      width: 90%;
      margin: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      margin-bottom: 50px;
    }
    
    .card-box {
      width: 300px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
      transition: 0.4s;
    }
    
    .card-box:hover {
      transform: translateY(-10px);
    }
    
    .card-box img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }
    
    .content {
      padding: 20px;
      text-align: center;
    }
    
    .price {
      font-size: 25px;
      color: green;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .btn-buy {
      background: #ff6600;
      color: white;
      padding: 10px 25px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      transition: 0.3s;
    }
    
    .btn-buy:hover {
      background: #cc5200;
    }
  </style>

  <h1 class="title">🥛 Badam Shake Special 🥛</h1>

  <div class="container-box">
    <!-- Card 1 -->
    <div class="card-box">
      <img src="/static/images/bdmsek1.jpg" />

      <div class="content">
        <h3>Classic Badam Shake</h3>

        <p class="price">₹150</p>

        <button class="btn-buy">Buy Now</button>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card-box">
      <img src="/static/images/bdmsek2.jpg" />

      <div class="content">
        <h3>Royal Almond Shake</h3>

        <p class="price">₹200</p>

        <button class="btn-buy">Buy Now</button>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="card-box">
      <img src="/static/images/bdmsek3.jpg" />

      <div class="content">
        <h3>Kesar Badam Shake</h3>

        <p class="price">₹250</p>

        <button class="btn-buy">Buy Now</button>
      </div>
    </div>

    <!-- Card 4 -->
    <div class="card-box">
      <img src="/static/images/bdmsek4.jpg" />

      <div class="content">
        <h3>Special Dryfruit Shake</h3>

        <p class="price">₹300</p>

        <button class="btn-buy">Buy Now</button>
      </div>
    </div>
  </div>
{% endblock %}
